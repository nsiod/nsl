name: Release

# Builds per-platform binaries and publishes them as GitHub Release assets.
# Triggered by pushing a tag like `v0.1.0` or manually via workflow_dispatch.
#
# Packaging:
#   Unix:    nsl-<version>-<subpkg>.tar.gz   (contains ./nsl)
#   Windows: nsl-<version>-<subpkg>.zip      (contains nsl.exe)
#
# Downstream: run the manual `npm` workflow with this tag to publish npm
# platform subpackages from these release assets.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: build linux (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            subpkg: linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            subpkg: linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package tarball
        run: |
          set -eu
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/nsl" nsl
          chmod +x nsl
          tar -czf "dist/nsl-${{ matrix.subpkg }}.tar.gz" nsl
          rm nsl

      - uses: actions/upload-artifact@v7
        with:
          name: asset-${{ matrix.subpkg }}
          path: dist/nsl-${{ matrix.subpkg }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: build macos (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-26-intel
            subpkg: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-26
            subpkg: darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package tarball
        run: |
          set -eu
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/nsl" nsl
          chmod +x nsl
          tar -czf "dist/nsl-${{ matrix.subpkg }}.tar.gz" nsl
          rm nsl

      - uses: actions/upload-artifact@v7
        with:
          name: asset-${{ matrix.subpkg }}
          path: dist/nsl-${{ matrix.subpkg }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: build windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            subpkg: win32-x64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package zip
        shell: bash
        run: |
          set -eu
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/nsl.exe" nsl.exe
          7z a "dist/nsl-${{ matrix.subpkg }}.zip" nsl.exe
          rm nsl.exe

      - uses: actions/upload-artifact@v7
        with:
          name: asset-${{ matrix.subpkg }}
          path: dist/nsl-${{ matrix.subpkg }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish github release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all platform assets
        uses: actions/download-artifact@v8
        with:
          pattern: asset-*
          path: artifacts
          merge-multiple: true

      - name: List assets
        run: ls -la artifacts/

      - name: Create tag (if dispatched)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.tag.outputs.name }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --generate-notes \
            artifacts/*.tar.gz artifacts/*.zip
