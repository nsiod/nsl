[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "warn"
# Accepted advisories (reviewed and deemed acceptable for this project).
# - RUSTSEC-2025-0069: `daemonize` is unmaintained. No drop-in replacement
#   provides the full double-fork + stdio redirection required by `nsl start`.
# - RUSTSEC-2025-0134: `rustls-pemfile` is unmaintained. Used only for local
#   CA cert/key loading; migration to `rustls-pki-types` tracked separately.
# - RUSTSEC-2025-0141: `bincode` 1.3.3 is unmaintained. The advisory itself
#   states v1.3.3 is the team-blessed final version (no security issue,
#   development simply ceased). Used by `tunnel` for its control-frame
#   wire format; migration to bincode 2.x is breaking and tracked separately.
ignore = [
    "RUSTSEC-2025-0069",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    # Pulled in transitively by `rustls-platform-verifier` →
    # `webpki-root-certs`. CDLA-Permissive-2.0 is a Linux Foundation
    # license analogous in scope to MIT/Apache for data bundles.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
